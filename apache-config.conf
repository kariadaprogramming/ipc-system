# Apache configuration for IPC System
# Add this to your httpd.conf or create as ipc-system.conf in Apache's conf.d/extra/

Alias /ipc-system "C:/Users/YourUser/Documents/Projects/ipc-system/frontend/build"

<Directory "C:/Users/YourUser/Documents/Projects/ipc-system/frontend/build">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted

    # Enable CORS for API calls
    Header set Access-Control-Allow-Origin "*"
    Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header set Access-Control-Allow-Headers "Content-Type, Authorization"

    # Handle React Router - redirect all routes to index.html
    RewriteEngine On
    RewriteBase /ipc-system
    RewriteRule ^index\.html$ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /ipc-system/index.html [L]
</Directory>

# Proxy API calls to backend
ProxyPass /ipc-system/api http://localhost:5000/api
ProxyPassReverse /ipc-system/api http://localhost:5000/api
