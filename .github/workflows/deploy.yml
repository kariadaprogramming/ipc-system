name: Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "Starting deployment..."

            # Navigate to project directory
            cd ${{ secrets.PROJECT_PATH }}

            # Pull latest changes
            git pull origin main

            # Deploy Frontend
            echo "Installing frontend dependencies..."
            cd frontend
            npm install
            echo "Building frontend..."
            npm run build

            # Copy frontend build to XAMPP htdocs
            echo "Copying frontend build to XAMPP..."
            rm -rf ${{ secrets.XAMPP_PATH }}/ipc-system
            mkdir -p ${{ secrets.XAMPP_PATH }}/ipc-system
            cp -r build/* ${{ secrets.XAMPP_PATH }}/ipc-system/

            # Deploy Backend
            echo "Installing backend dependencies..."
            cd ../backend
            npm install

            # Restart backend service using PM2
            pm2 restart ipc-backend || pm2 start server.js --name ipc-backend

            echo "Deployment completed successfully!"
