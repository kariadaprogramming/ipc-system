name: Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            powershell -Command "Write-Host 'Starting deployment...'; D:; cd '${{ secrets.PROJECT_PATH }}'; Write-Host 'Stopping running processes...'; taskkill /F /IM node.exe 2`$null; Write-Host 'Done'; Write-Host 'Pulling latest changes...'; git pull; Write-Host 'Installing frontend dependencies...'; cd frontend; npm install; Write-Host 'Building frontend with production environment...'; `$env:NODE_ENV='production'; npm run build; Write-Host 'Installing backend dependencies...'; cd ../backend; npm install; Write-Host 'Deployment completed successfully!'; Write-Host 'Please start the application manually'"
