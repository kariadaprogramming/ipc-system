name: Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "Starting deployment..."

            # Navigate to project directory
            cd ${{ secrets.PROJECT_PATH }}

            # Pull latest changes
            git pull origin main

            # Deploy Frontend
            echo "Installing frontend dependencies..."
            cd frontend
            npm install
            echo "Building frontend with production environment..."
            $env:NODE_ENV="production"
            npm run build

            # Copy frontend build to Apache document root
            echo "Copying frontend build to Apache..."
            Copy-Item -Path build -Destination "${{ secrets.APACHE_DOCUMENT_ROOT }}/ipc-system" -Recurse -Force

            # Deploy Backend
            echo "Installing backend dependencies..."
            cd ../backend
            npm install

            # Restart backend service using PM2 with production environment
            pm2 restart ipc-backend --update-env || pm2 start server.js --name ipc-backend --env production

            # Restart Apache to apply configuration changes
            echo "Restarting Apache..."
            # For XAMPP on Windows
            # C:\xampp\apache\bin\httpd.exe -k restart
            # Or use Apache Monitor
            # Or restart Apache service
            echo "Please restart Apache manually if needed"

            echo "Deployment completed successfully!"
