name: Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "Starting deployment..."

            # Navigate to project directory
            cd ${{ secrets.PROJECT_PATH }}

            # Pull latest changes
            git pull origin main

            # Deploy Frontend
            echo "Installing frontend dependencies..."
            cd frontend
            npm install
            echo "Building frontend with production environment..."
            $env:NODE_ENV="production"
            npm run build

            # Start frontend with PM2
            echo "Starting frontend with PM2..."
            pm2 restart ipc-frontend --update-env || pm2 start npm --name ipc-frontend -- run serve

            # Deploy Backend
            echo "Installing backend dependencies..."
            cd ../backend
            npm install

            # Restart backend service using PM2 with production environment
            pm2 restart ipc-backend --update-env || pm2 start server.js --name ipc-backend --env production

            echo "Deployment completed successfully!"
