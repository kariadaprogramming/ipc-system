name: Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: "D: && cd ${{ secrets.PROJECT_PATH }} && git pull && cd frontend && npm install && npm run build && cd ../backend && npm install && pm2 start ecosystem.config.js || pm2 restart ecosystem.config.js && cd ../frontend && taskkill /F /IM node.exe 2>nul || echo No node processes && start /B node serve.js && pm2 save && echo Deployment completed successfully"
